<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SignalDesk – AI Decision Engine</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 32px;
    }

    .wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 20px;
    }

    h1 { margin-top: 0; }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    .risk-low { color: #4ade80; }
    .risk-medium { color: #facc15; }
    .risk-high { color: #f87171; }
  </style>
</head>
<body>

<h1>SignalDesk</h1>
<p>Your AI Decision Engine for real-time business signals.</p>

<div class="ai-panel">
  <h3>🧠 AI Analysis</h3>
  <p id="aiInsight"></p>

  <h4>🎯 Recommendation</h4>
  <p id="aiRecommendation"></p>

  <h4>📊 Confidence</h4>
  <p id="aiConfidence"></p>
</div>

  <div class="card">
    <h2>Input Console</h2>

    <input id="users" placeholder="Users" value="1200" />
    <input id="revenue" placeholder="Revenue" value="120000" />
    <input id="sessions" placeholder="Sessions" value="5" />
    <input id="churn" placeholder="Churn" value="2" />

    <button onclick="loadInsights()">Analyze</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
